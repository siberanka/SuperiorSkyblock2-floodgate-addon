# SSBGeyser - SuperiorSkyblock2 Bedrock/Floodgate Addon Configuration

# Default language file to load (messages_tr.yml, messages_en.yml, etc.)
language: "tr"

# GUI Translation Settings
gui:
  # If true, items matching the filler-materials list will not be displayed as buttons in Bedrock forms.
  # This makes Bedrock forms much cleaner and easier to navigate on mobile and consoles.
  hide-filler-items: true

  # If true, menu items whose display name and lore become empty after color-code cleanup
  # will not be displayed as Bedrock form buttons.
  hide-empty-buttons: true

  # Bedrock form buttons use a light background. White/light-gray Java text is
  # remapped to these readable defaults while semantic colors remain intact.
  text:
    remap-low-contrast-colors: true
    default-title-color: "GOLD"
    default-lore-color: "DARK_GRAY"

  # Materials that should be treated as layout fillers and filtered out.
  filler-materials:
    - "GRAY_STAINED_GLASS_PANE"
    - "BLACK_STAINED_GLASS_PANE"
    - "WHITE_STAINED_GLASS_PANE"
    - "GLASS_PANE"
    - "AIR"

  # Custom texture overrides for specific items. Keep this empty unless a path/URL
  # is verified on Bedrock; invalid paths render as purple/black missing textures.
  # Items not listed here are shown without an icon. This avoids Bedrock's purple/black
  # missing-texture icon when a guessed Java material path does not exist on the client.
  # URL images are supported and can be used for custom models or special heads.
  texture-mappings: {}

  # Custom Java head textures are skin atlases and render incorrectly as form logos.
  # Use a built-in Bedrock world-template glyph for island creation buttons.
  # Set this to an empty string to show clean text-only buttons instead.
  island-creation-icon: "textures/i/glyph_world_template.png"

  # Keep this false unless you intentionally want an extra form click sound.
  # SuperiorSkyblock2 menus can already play their own success/fail sounds.
  play-click-sound: false

  # Sound to play when play-click-sound is enabled (use bukkit sound name or empty to disable)
  click-sound: "UI_BUTTON_CLICK"

# Defensive limits for malicious clients, stale forms and accidental double responses.
security:
  # Minimum delay between accepted Bedrock form clicks for one player.
  # This is intentionally small so normal menu use is not affected.
  min-click-interval-ms: 150

  # Ignore form responses that arrive long after their source menu was opened.
  form-session-timeout-ms: 30000
